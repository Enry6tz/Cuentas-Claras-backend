        endDate:
          type: string
          example: '2026-07-22'
          description: ISO date (YYYY-MM-DD)
        baseCurrency:
          type: string
          example: ARS
          description: ISO 4217 currency code (3 letters)
        iconId:
          type: number
          example: 1
          minimum: 1
          maximum: 30
          description: Id del emoji (1..30)
        colorId:
          type: number
          example: 1
          minimum: 1
          maximum: 30
          description: Id del color (1..30)
      required:
