          type: number
          example: 50
          description: Exact amount owed (in base currency)
      required:
        - userId
        - amountOwed
    CreateExpensePercentShareDto:
      type: object
      properties:
        userId:
          type: string
          description: User who owes
          format: uuid
        percent:
          type: number
          example: 25
          description: Percentage of total owed
      required:
        - userId
        - percent
    CreateExpenseDto:
      type: object
      properties:
        description:
          type: string
          example: Cena en el restaurante
        originalAmount:
          type: number
          example: 100
          description: Original amount in the original currency
        originalCurrency:
          type: string
          example: USD
          description: ISO 4217 currency code
        date:
          type: string
          example: '2026-07-15'
        category:
          type: string
          example: Comida
        splitType:
          type: string
          enum:
            - EQUAL
            - EXACT
            - PERCENT
          example: EQUAL
        payers:
          description: Who paid and how much. Sum of amountPaid must equal originalAmount.
          type: array
          items:
            $ref: '#/components/schemas/CreateExpensePayerDto'
        participantIds:
          description: 'Required for EQUAL: participants in the split.'
          type: array
          items:
            type: string
        exactShares:
          description: 'Required for EXACT: exact amounts owed per user.'
          type: array
          items:
            $ref: '#/components/schemas/CreateExpenseExactShareDto'
        percentShares:
          description: 'Required for PERCENT: percentages owed per user. Must sum to 100.'
          type: array
          items:
            $ref: '#/components/schemas/CreateExpensePercentShareDto'
        manualExchangeRate:
          type: number
          description: >-
            Manual exchange rate override. Only used if originalCurrency !=
            baseCurrency and API fails.
          example: 1200.5
      required:
        - description
        - originalAmount
        - originalCurrency
        - splitType
        - payers
